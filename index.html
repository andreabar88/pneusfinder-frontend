<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Pneusfinder - Confronta prezzi pneumatici online</title>

  <meta name="description" content="Confronta i prezzi dei pneumatici online. Trova le migliori offerte su Michelin, Pirelli, Goodyear e altre marche.">
  <meta name="keywords" content="pneumatici, gomme auto, confronto prezzi gomme, pneumatici economici, 225 40 r18">
  <meta name="robots" content="index, follow">

  <meta property="og:title" content="Pneusfinder - Confronta prezzi pneumatici">
  <meta property="og:description" content="Trova il miglior prezzo per i tuoi pneumatici confrontando i principali negozi online.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://pneusfinder.it">

  <link rel="canonical" href="https://pneusfinder.it">
  <link rel="stylesheet" href="css/style.css">

  
</head>
<body>
  <main class="container">
    <section class="hero">
      <div class="hero-left">
        <img src="pneusfinder_logo.png" alt="Logo Pneusfinder" class="hero-logo">

        <h1>Trova le migliori gomme al miglior prezzo</h1>
        <p>Confronta i prezzi dei pneumatici in modo semplice, veloce e chiaro.</p>

        <form id="searchForm">
          <input
            type="text"
            id="searchInput"
            placeholder="Es. 225/40 R18"
            required
          />
          <button type="submit">Cerca</button>
        </form>

        <div id="status">Pronto per la ricerca</div>
        <div id="results"></div>
      </div>

      <div class="hero-right">
        <img src="mockup_app_screen.png.png" alt="Mockup app Pneusfinder" class="hero-mockup">
      </div>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
