<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Pneusfinder - Confronta prezzi pneumatici online</title>

  <meta name="description" content="Confronta i prezzi dei pneumatici online. Trova le migliori offerte su Michelin, Pirelli, Goodyear e molte altre marche.">

  <meta name="keywords" content="pneumatici, gomme auto, confronto prezzi gomme, pneumatici economici">

  <meta name="robots" content="index, follow">

</head>
<body>
  <main class="container">
    <h1>Pneusfinder</h1>
    <p>Confronta i prezzi dei pneumatici in modo semplice.</p>

    <form id="searchForm">
      <input
        type="text"
        id="searchInput"
        placeholder="Es. 225/40 R18"
        required
      />
      <button type="submit">Cerca</button>
    </form>

    <div id="status">Pronto per la ricerca</div>
    <div id="results"></div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
